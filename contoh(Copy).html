<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acelis Pay - Fast Digital Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary-blue: #3b82f6;
            --dark-navy: #0F172A;
            --accent-blue: #60a5fa;
            --gold-tier: #FFD700;
            --animate-delay: 0.1s;
            --animate-duration: 0.5s;
        }

        @keyframes fadeInUpCustom {
            from {
                opacity: 0;
                transform: translate3d(0, 20px, 0);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }
        .animate-near {
            animation: fadeInUpCustom 0.5s ease backwards;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050a14; 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .card-shadow { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .bottom-nav-item.active { color: #ffffff; font-weight: 800; pointer-events: none; }
        
        .page-content { display: none; }
        .page-active { display: block; }

        .nav-container {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 3000;
        }

        .bottom-nav {
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 20px;
            border-radius: 50px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Filter Chip Oval Custom - Adjusted Size and Spacing */
        .filter-chip {
            padding: 6px 16px;
            border-radius: 9999px; /* Bentuk Oval */
            background: #1e293b;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .filter-chip.active {
            background: rgba(59, 130, 246, 0.2); /* Biru Transparan */
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            pointer-events: none; /* Tidak bisa diklik jika aktif */
        }

        .is-sold .img-grayscale {
            filter: grayscale(1);
            opacity: 0.6;
        }

        .sold-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 10px;
            background: rgba(15, 23, 42, 0.4);
        }

        .sold-badge {
            border: 1px solid rgba(255, 255, 255, 0.3); 
            background: rgba(15, 23, 42, 0.9); 
            color: #ffffff;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .img-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .game-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: 800;
            color: #ffffff;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 35px;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0F172A; 
            z-index: 2000;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        #modalImages {
            display: flex;
            transition: transform 0.3s ease-in-out;
            pointer-events: none; 
        }

        .modal-img-wrapper {
            width: 100%;
            flex-shrink: 0;
        }

        .modal-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.7);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }
        .nav-btn.disabled { opacity: 0.2; cursor: not-allowed; }

        .breadcrumb {
            font-size: 11px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 0;
        }
        .breadcrumb span { cursor: pointer; transition: 0.2s; }
        .breadcrumb span:hover { color: #3b82f6; }
        .breadcrumb span.active {
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
        }
        .breadcrumb span.active:hover { color: #94a3b8; }
    </style>
</head>

    <script>
        let produkData = [];
        let currentImgIndex = 0;
        let activeImagesCount = 0;

        function loadData() {
            produkData = JSON.parse(localStorage.getItem('produkAcelis')) || [];
        }

        function getTierColor(tier) {
            const t = (tier || '').toLowerCase();
            if (t.includes('pelajar')) return 'bg-blue-600/20 text-blue-400';
            if (t.includes('premium')) return 'bg-yellow-500/20 text-yellow-500';
            return 'bg-slate-600/20 text-slate-400';
        }

        function renderKatalog(filterData = null) {
            const container = document.getElementById('container-katalog');
            if (!container) return;
            const displayData = filterData || produkData;
            container.innerHTML = '';
            document.getElementById('total-katalog').innerText = `${displayData.length} produk`;

            if (displayData.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-10 text-slate-500 text-xs">Produk belum tersedia</div>`;
                return;
            }

            displayData.forEach((p, index) => {
                const isSold = p.status === 'sold' || p.status === 'terjual';
                const originalIndex = produkData.findIndex(item => item.nama === p.nama && item.harga === p.harga);
                const clickAction = isSold ? '' : `onclick="openDetail('produk', ${originalIndex})"`;
                const mainImg = p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/300';
                
                let tierDisplay = p.tier || 'Reguler';
                if(tierDisplay.toLowerCase() === 'sultan') tierDisplay = 'Premium';
                const tierColor = getTierColor(tierDisplay);

                let kategoriDisplay = p.kategori || 'Game';
                const lowerKategori = kategoriDisplay.toLowerCase();
                if (lowerKategori.includes('mobile legends')) {
                    kategoriDisplay = 'MLBB';
                } else if (lowerKategori.replace(/\s/g, '') === 'freefire') {
                    kategoriDisplay = 'Free Fire';
                }
                
                container.innerHTML += `
                    <div ${clickAction} class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden relative ${isSold ? 'is-sold' : ''} animate-near cursor-pointer">
                        <div class="img-container">
                            <img src="${mainImg}" class="img-grayscale" alt="${p.nama}" onerror="this.src='https://via.placeholder.com/300'">
                            <div class="game-badge" onclick="event.stopPropagation(); applyGameFilter('${p.kategori}')">${kategoriDisplay}</div>
                            ${isSold ? `<div class="sold-overlay"><div class="sold-badge">TERJUAL</div></div>` : ''}
                        </div>
                        <div class="p-3">
                            <div class="${tierColor} text-[10px] px-2 py-1 rounded-md font-bold mb-1.5 uppercase w-fit">${tierDisplay}</div>
                            <h3 class="font-bold text-[11px] truncate mt-0.5">${p.nama}</h3>
                            <div class="flex items-center justify-between mt-2">
                                <span class="${isSold ? 'line-through text-slate-500' : 'text-blue-500'} font-bold text-[11px]">${p.harga}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function applySort(type) {
            let sorted = [...produkData];
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            if (type === 'Semua') {
                document.querySelector('.filter-chip').classList.add('active');
            }
            renderKatalog(sorted);
        }

        function applyGameFilter(game) {
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                const chipText = chip.innerText.toLowerCase();
                const targetGame = game.toLowerCase();
                if(chipText === targetGame || (targetGame.includes('mobile legends') && chipText === 'mlbb')) {
                    chip.classList.add('active');
                }
            });
            let filtered = produkData.filter(p => (p.kategori || '').toLowerCase().includes(game.toLowerCase()));
            renderKatalog(filtered);
            const container = document.getElementById('container-katalog');
            container.classList.remove('animate-near');
            void container.offsetWidth; 
            container.classList.add('animate-near');
        }

        function openDetail(type, index) {
            const data = produkData[index];
            if (!data) return;
            const modal = document.getElementById('detailModal');
            const imgContainer = document.getElementById('modalImages');
            const body = document.getElementById('modalBody');
            const action = document.getElementById('modalAction');
            const shareBtn = document.getElementById('btnShare');
            const breadKategori = document.getElementById('breadKategori');
            const breadNama = document.getElementById('breadNama');
            
            breadKategori.innerText = data.kategori || 'Game';
            breadNama.innerText = data.nama;

            breadKategori.onclick = () => {
                closeModal();
                switchPage('page-history');
                applyGameFilter(data.kategori);
            };

            currentImgIndex = 0;
            imgContainer.style.transform = `translateX(0)`;
            imgContainer.innerHTML = '';
            
            const images = data.images && data.images.length > 0 ? data.images : ['https://via.placeholder.com/300'];
            activeImagesCount = images.length;
            images.forEach(img => {
                imgContainer.innerHTML += `<div class="modal-img-wrapper"><img src="${img}" onerror="this.src='https://via.placeholder.com/300'"></div>`;
            });

            let tierDisplay = data.tier || 'Reguler';
            if(tierDisplay.toLowerCase() === 'sultan') tierDisplay = 'Premium';
            const tierColor = getTierColor(tierDisplay);

            body.innerHTML = `
                <div class="flex flex-col gap-1">
                    <span class="inline-block ${tierColor} text-[10px] px-2 py-1 rounded-md font-bold uppercase w-fit">${tierDisplay}</span>
                    <h2 class="text-xl font-black text-white">${data.nama}</h2>
                </div>
                <div class="px-1 py-1">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-0">Harga Akun</p>
                    <p class="text-xl font-black text-blue-500">${data.harga}</p>
                </div>
                <div class="pt-2 border-t border-slate-800/50">
                    <div class="text-xs text-slate-400 leading-relaxed whitespace-pre-line mt-0">
                        ${data.deskripsi || 'Tidak ada deskripsi'}
                    </div>
                </div>
            `;

            shareBtn.onclick = () => {
                if (navigator.share) {
                    navigator.share({ title: data.nama, text: `Cek akun ${data.nama} di Acelis Pay! Harga: ${data.harga}`, url: window.location.href });
                }
            };

            action.innerHTML = `<a href="https://wa.me/6285707356154?text=Halo Admin, saya ingin membeli akun: ${data.nama}" class="w-full block text-center bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-extrabold shadow-lg shadow-blue-900/20 transition-all">Beli Sekarang</a>`;

            updateNavButtons();
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function nextImage() { 
            if (activeImagesCount > 1 && currentImgIndex < activeImagesCount - 1) { 
                currentImgIndex++; 
                updateImagePos(); 
            } 
        }

        function prevImage() { 
            if (activeImagesCount > 1 && currentImgIndex > 0) { 
                currentImgIndex--; 
                updateImagePos(); 
            } 
        }

        function updateImagePos() { 
            document.getElementById('modalImages').style.transform = `translateX(-${currentImgIndex * 100}%)`; 
            updateNavButtons();
        }

        function updateNavButtons() {
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            
            if(currentImgIndex === 0) btnPrev.classList.add('disabled');
            else btnPrev.classList.remove('disabled');
            
            if(currentImgIndex === activeImagesCount - 1) btnNext.classList.add('disabled');
            else btnNext.classList.remove('disabled');
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function switchPage(pageId) {
            const currentPage = sessionStorage.getItem('activePage');
            if(currentPage === pageId) return; // Mencegah klik ulang jika halaman sudah aktif

            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('page-active'));
            const newPage = document.getElementById(pageId);
            if(newPage) newPage.classList.add('page-active');
            
            if(pageId === 'page-history') {
                const container = document.getElementById('container-katalog');
                container.classList.remove('animate-near');
                void container.offsetWidth;
                container.classList.add('animate-near');
                renderKatalog();
            }

            document.querySelectorAll('.bottom-nav-item').forEach(n => { n.classList.remove('active'); n.classList.add('text-slate-400'); });
            const navId = 'nav-' + pageId.split('-')[1];
            const activeNav = document.getElementById(navId);
            if(activeNav) { 
                activeNav.classList.remove('text-slate-400'); 
                activeNav.classList.add('active'); 
            }
            
            sessionStorage.setItem('activePage', pageId);
        }

        function handleSearchEnter(event) {
            if (event.key === 'Enter') {
                const val = document.getElementById('searchInput').value.toLowerCase();
                const filtered = produkData.filter(p => 
                    (p.nama && p.nama.toLowerCase().includes(val)) || 
                    (p.kategori && p.kategori.toLowerCase().includes(val)) ||
                    (p.deskripsi && p.deskripsi.toLowerCase().includes(val))
                );
                switchPage('page-history');
                document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
                document.querySelector('.filter-chip').classList.add('active');
                renderKatalog(filtered);
            }
        }

        window.onload = () => { 
            loadData(); 
            const savedPage = sessionStorage.getItem('activePage') || 'page-history';
            // Reset active state for switchPage check
            sessionStorage.removeItem('activePage');
            switchPage(savedPage);
            renderKatalog(); 
        };
        window.addEventListener('storage', () => { loadData(); renderKatalog(); });
    </script>
</body>
</html>
